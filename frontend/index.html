<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chemHeaven Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- ===================== LOGIN PAGE ===================== -->
  <div id="login-page" class="login-page">
    <div class="login-background-decoration">
      <div class="floating-orb orb-1"></div>
      <div class="floating-orb orb-2"></div>
      <div class="floating-orb orb-3"></div>
    </div>
    <div class="login-card">
      <div class="login-inner">

        <div class="login-header">
          <div class="login-logo-wrapper">
            <div class="login-logo"><img src="assets/logo.png" alt="chemHeaven Logo" width="100px"></div>
          </div>
          <h1>chemHeaven</h1>
          <p class="login-subtitle">Sign in to your account</p>
        </div>

        <div class="login-body">
          <div id="login-mode">
            <form id="login-form" novalidate>
              <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                  <input type="text" id="username" name="username" placeholder="Enter username" required
                    autocomplete="username">
                </div>
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                  <input type="password" id="password" name="password" placeholder="Enter password" required
                    autocomplete="current-password">
                </div>
              </div>
              <div id="login-error" class="error-msg hidden"></div>
              <button type="submit" class="btn btn-primary btn-full btn-animated" id="login-btn">
                <span class="btn-text">Sign In</span>
                <span class="btn-shimmer"></span>
              </button>
            </form>
            <p class="auth-toggle">
              Don't have an account?
              <button type="button" id="toggle-register" class="auth-link">Register here</button>
            </p>
          </div>
        </div>

      </div>
    </div>


    <!-- Register Form -->
    <div id="register-mode" class="hidden">
      <p class="login-subtitle">Create a new account</p>
      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="reg-username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="reg-username" name="username" placeholder="Choose a username" required
              autocomplete="username">
          </div>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="reg-password" name="password" placeholder="Create a password" required
              autocomplete="new-password">
          </div>
        </div>
        <div class="form-group">
          <label for="reg-confirm-password">Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="reg-confirm-password" name="confirm-password" placeholder="Confirm your password"
              required autocomplete="new-password">
          </div>
        </div>
        <div class="form-group">
          <label for="reg-email">Email (optional)</label>
          <div class="input-wrapper">
            <input type="email" id="reg-email" name="email" placeholder="your@email.com" autocomplete="email">
          </div>
        </div>
        <div id="register-error" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary btn-full btn-animated" id="register-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-shimmer"></span>
        </button>
      </form>
      <p class="auth-toggle">
        Already have an account?
        <button type="button" id="toggle-login" class="auth-link">Sign in here</button>
      </p>
    </div>
  </div>
  </div>

  <!-- ===================== DASHBOARD ===================== -->
  <div id="dashboard" class="dashboard hidden">

    <div class="dashboard-layout">

      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo-container">
            <span class="sidebar-logo">🛍</span>
            <div class="logo-glow"></div>
          </div>
          <h2>UIShop</h2>
          <span id="user-role-badge" class="role-badge"></span>
        </div>

        <nav class="sidebar-nav" aria-label="Main navigation">
          <a href="#" class="nav-link" data-section="products">
            <span class="nav-icon" aria-hidden="true">📦</span>
            <span class="nav-text">Products</span>
            <span class="nav-indicator"></span>
          </a>
          <a href="#" class="nav-link" data-section="orders">
            <span class="nav-icon" aria-hidden="true">🗒️</span>
            <span class="nav-text">Orders</span>
            <span class="nav-indicator"></span>
          </a>
          <a href="#" class="nav-link" data-section="profile">
            <span class="nav-icon" aria-hidden="true">👤</span>
            <span class="nav-text">Profile</span>
            <span class="nav-indicator"></span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <div id="sidebar-user-info" class="sidebar-user"></div>
          <button id="logout-btn" class="btn btn-danger btn-full btn-animated">
            <span class="btn-text"><span aria-hidden="true">⏻</span> Logout</span>
            <span class="btn-shimmer"></span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content" id="main-content">
        <div class="main-inner">
          <div id="content-area"></div>
        </div>
      </main>

    </div>

  </div>

  </div>

  <!-- ===================== MODAL ===================== -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="modal-close" aria-label="Close modal">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
